<div class="resume">
    <form action="" method="post">
        {% csrf_token %}
        <h1>Resume</h1>
        <label for="fname">Full name</label>
        <input type="text" id="fname" name="fname"><br/>
                    
        <label for="date">Date of birth</label>
        <input type="date" id="date" name="date"><br/><br/>
                
        <label for="number">Phone number</label>
        <input type="tel" id="number" name="number"><br/><br/>

        <label for="mail">E-mail</label>
        <input type="email" id="mail" name="email"><br/>

        <label for="exp">Experience</label><br/>
        <textarea name="exp" id="exp" cols="40" rows="5"></textarea><br/>

        <label for="skills">Skills</label><br/>
        <textarea name="skills" id="skills" cols="40" rows="5"></textarea><br/>
                
        <label for="lang" class="lang">Language</label>
        <div id="languageFormsContainer">
            <a onclick="addLanguageForm()">+</a>
        </div>

        <label for="inputFile">File Upload</label>
        <input type="file" class="form-control-file" id="inputFile" name="inputFile" accept="image/*" onchange="readUrl(this)" data-title="Drag and drop a file">

        <div class="canccreate">
            <input class="btns" type="button" value="Cancel" onclick="history.back()"/>
            <button type="submit">Update resume</button>
        </div>
    </form>
</div>
{% endblock body %}
