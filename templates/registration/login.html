{% extends 'base.html' %}

{% block page_title %}Login{% endblock %}

{% block body %}
<a href="{% url 'home' %}">Go to Home</a>
<form id="login-form" method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <a id="open-modal-btn_sign">Sign in</a>
    <a href="{% url 'password_reset' %}">Forgot password?</a><br><br>

    <button class="btnl" type="submit">Log in</button>
</form>
{% endblock body %}
